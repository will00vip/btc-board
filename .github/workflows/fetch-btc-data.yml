name: Fetch BTC Data

on:
  schedule:
    # 每15分钟执行一次 (UTC时间)
    - cron: '*/15 * * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch BTC Klines
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import time

          INTERVALS = [
            ('1m',  200),
            ('5m',  180),
            ('15m', 150),
            ('30m', 120),
            ('1h',  100),
            ('4h',  80),
            ('1d',  60),
            ('1w',  52),
          ]

          result = {
            'updated': int(time.time() * 1000),
            'klines': {}
          }

          for iv, lim in INTERVALS:
            url = f'https://data-api.binance.vision/api/v3/klines?symbol=BTCUSDT&interval={iv}&limit={lim}'
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=15) as resp:
                data = json.loads(resp.read())
                result['klines'][iv] = data
                print(f'OK {iv}: {len(data)} bars')
            except Exception as e:
              print(f'FAIL {iv}: {e}')
              result['klines'][iv] = []

          with open('data.json', 'w') as f:
            json.dump(result, f)

          print(f"Written data.json, updated={result['updated']}")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "data: update BTC klines $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
